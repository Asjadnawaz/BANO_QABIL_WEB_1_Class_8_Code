<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Facebook Login</title>
</head>

<body>
    <!-- Left Side Section -->
    <div class="Text-div">
        <h1>facebook</h1>
        <p class="Left-para">Connect with the friends and the World around you on Facebook.</p>
    </div>

    <!-- Right Side Section -->
    <div class="Form-div">
        <center>
            <form>
                <input type="text" placeholder="Email or Phone number"><br>
                <input type="password" placeholder="Password"><br>
                <button class="login-btn">Login</button>
            </form>
            <p class="forget-password">Forget password?</p>
            <hr><br>
            <button class="CreateAccount-btn">Create New Account</button>
        </center>
    </div>

</body>

</html>
